<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordCross Puzzle - 플래시카드로 학습하는 초등영어 800+</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="flashcard.css">
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="style_wc.css" media="screen">
    <link rel="stylesheet" href="print_wc.css" media="print">
</head>
<body>
    <header class="screen-only">
        <h1>🧩 WordCross Puzzle
            <span class="puzzle-level" id="levelBadge">-</span>
            <span class="puzzle-batch-number" id="batchBadge">-</span>
        </h1>
    </header>

    <h2 class="puzzle-title" id="printTitle">WordCross Puzzle</h2>

    <div id="puzzleContainer">
        <div class="wordcross-grid" id="grid"></div>
        <div class="clues-section">
            <div class="clues-column">
                <h3>ACROSS
                    <span class="clue-header-controls">
                        <button type="button" class="speak-btn" id="acrossSpeakBtn" title="전체듣기 (설정에 따름)"><i class="fa-solid fa-volume-high"></i></button>
                    </span>
                </h3>
                <ol id="acrossList"></ol>
            </div>
            <div class="clues-column">
                <h3>DOWN
                    <span class="clue-header-controls">
                        <button type="button" class="speak-btn" id="downSpeakBtn" title="전체듣기 (설정에 따름)"><i class="fa-solid fa-volume-high"></i></button>
                    </span>
                </h3>
                <ol id="downList"></ol>
            </div>
        </div>
    </div>

    <!-- 정답 보기(및 인쇄) 시 나타나는 단어 요약 그리드: 영어단어/한글의미/영어예문/한글예문 -->
    <div id="answerGrid" class="answer-grid"></div>

    <footer class="print-only">
        <div class="footer-message">Written by wordsbean</div>
    </footer>

    <!-- 썸네일 클릭 시 확대 보기 -->
    <div id="imgLightbox" class="img-lightbox">
        <img id="lightboxImg" src="" alt="">
    </div>

    <div class="pagination-controls">
        <button id="newPuzzleBtn" class="nav-button" data-i18n="newPuzzle">새 퍼즐 만들기</button>
        <button id="toggleAnswerBtn" class="nav-button" data-i18n="showAnswer">정답 보기</button>
        <button id="printBtn" class="nav-button" data-i18n="print">인쇄</button>
    </div>

    <script src="ui-i18n.js"></script>
    <script src="data/cards_all.js"></script>
    <script src="lang-pref.js"></script>
    <script src="cards-loader.js"></script>
    <script src="progress.js"></script>
    <script src="audio-pref.js"></script>
    <script src="playback-engine.js"></script>
    <script src="crossword_engine.js"></script>
    <script>
        // =========================================================
        // 설정
        // =========================================================
        const GRID_SIZE = 15;
        const WORDS_PER_PUZZLE = 10;
        const MIN_LEN = 3;
        const MAX_LEN = 9; // 15칸 그리드에 여유 있게 들어가는 길이 (알파벳 언어 기준)

        // 한글/한자/가나는 한 글자에 담긴 정보량이 알파벳 낱글자보다 훨씬 커서
        // "사랑"(2글자), "책"(1글자)처럼 짧은 게 오히려 자연스러운 단어입니다.
        // 알파벳 기준 MIN_LEN=3을 그대로 쓰면 이런 짧은 단어가 대거 걸러져버립니다.
        function getLenLimits() {
            const lang = (typeof getCurrentTargetLang === 'function') ? getCurrentTargetLang() : 'en';
            if (lang === 'ko' || lang === 'zh' || lang === 'ja') {
                return { min: 1, max: 6 };
            }
            return { min: MIN_LEN, max: MAX_LEN };
        }
        const MAX_ATTEMPTS = 3; // 배치 성공률을 높이기 위한 재시도 횟수 (엔진 자체 시간예산과 곱해지므로 과하지 않게)

        const gridEl = document.getElementById('grid');
        const acrossListEl = document.getElementById('acrossList');
        const downListEl = document.getElementById('downList');
        const levelBadge = document.getElementById('levelBadge');
        const batchBadge = document.getElementById('batchBadge');
        const printTitle = document.getElementById('printTitle');
        const toggleAnswerBtn = document.getElementById('toggleAnswerBtn');
        const answerGridEl = document.getElementById('answerGrid');
        const lightbox = document.getElementById('imgLightbox');
        const lightboxImg = document.getElementById('lightboxImg');

        // 오디오 재생(mp3 우선, 실패시 TTS 폴백)은 playback-engine.js를 사용합니다.

        let puzzleCount = 0;

        // =========================================================
        // 1) 후보 단어 풀 준비 (알파벳만, 길이 제한, 중복 제거)
        // =========================================================
        function buildWordPool() {
            const seen = new Set();
            const pool = [];
            for (const c of getActiveCardsData()) { // 완료 표시한 단어는 출제 대상에서 제외
                const w = (c.word || '').trim().toUpperCase();
                // 언어와 무관하게 "한 덩어리 단어"만 허용 (공백/하이픈/구두점 등 여러 단어로 된 건 제외)
                // 알파벳이든 한자/가나든 스크립트 종류는 상관하지 않음
                if (!w || /[\s\-'".,;:!?]/.test(w)) continue;
                const { min, max } = getLenLimits();
                if (w.length < min || w.length > max) continue;
                if (seen.has(w)) continue;
                seen.add(w);
                pool.push({ word: w, clue: c.meaning, image: c.image, level: c.level });
            }
            return pool;
        }

        function pickRandomWords(pool, count) {
            const shuffled = [...pool].sort(() => Math.random() - 0.5);
            return shuffled.slice(0, count);
        }

        // =========================================================
        // 2) 크로스워드 배치: crossword_puzzle_py3_final_cleaned.py 를
        //    JS로 포팅한 엔진(crossword_engine.js)을 그대로 사용
        // =========================================================

        // 한글/한자/가나는 배치 성공률 자체가 낮아서(음절/글자 단위 교차가 어려움),
        // 목표 개수만 딱 뽑으면 절반 넘게 떨어져나가 휑해집니다. 대신 후보를 훨씬
        // 많이 뽑아 시도하고, 그중 실제로 성공한 만큼만 그대로 보여주면 결과적으로
        // 최종 배치되는 절대 개수가 더 많아집니다 (성공률 %는 낮아도 모수가 크니까).
        function getCandidateCount() {
            const lang = (typeof getCurrentTargetLang === 'function') ? getCurrentTargetLang() : 'en';
            if (lang === 'ko' || lang === 'zh' || lang === 'ja') {
                return WORDS_PER_PUZZLE * 5; // 예: 10개 목표면 후보 50개 시도 (평균 9.2개 성공 확인됨)
            }
            return WORDS_PER_PUZZLE;
        }

        const ENGINE_TIME_BUDGET_SEC = 0.6; // 퍼즐 1개 생성에 허용하는 시간 예산
        const ENGINE_SPINS = 3;

        // 한국어는 음절 블록 단위라(예: 사랑=사+랑) 알파벳처럼 자연스럽게 교차하기 어려워서,
        // 흔한 첫 음절 14개를 백본으로 깔아두고 시작합니다. 다른 언어는 필요 없음(null).
        // 세 언어 다 실제 1108개 단어 전체 데이터에서 계산한 "가장 흔한 첫 글자 14개"를
        // 고정값으로 미리 박아뒀습니다 (매번 그때그때 계산하면 후보가 적을 때 교차가 잘
        // 안 되는 백본이 나올 수 있어서, 전체 데이터 기준 고정값이 훨씬 안정적입니다).
        const KOREAN_DUMMY_BACKBONE = '가나다라마바사아자차카타파하';
        const CHINESE_DUMMY_BACKBONE = '小大一地星在电好手下十打女老';
        const JAPANESE_DUMMY_BACKBONE = 'スおバコクボ一いカ地トよこフ';

        function getCrosswordBackbone() {
            const lang = (typeof getCurrentTargetLang === 'function') ? getCurrentTargetLang() : 'en';
            if (lang === 'ko') return KOREAN_DUMMY_BACKBONE;
            if (lang === 'zh') return CHINESE_DUMMY_BACKBONE;
            if (lang === 'ja') return JAPANESE_DUMMY_BACKBONE;
            return null;
        }

        function runEngine(picks, backbone) {
            const pairs = picks.map(w => [w.word, w.clue]);
            const engine = new CrosswordEngine(GRID_SIZE, GRID_SIZE, '-', 2000, pairs, backbone);
            engine.computeCrossword(ENGINE_TIME_BUDGET_SEC, ENGINE_SPINS);
            engine.orderNumberWords();
            return engine;
        }

        function generateCrossword(pool) {
            let bestEngine = null;
            let bestPicks = null;
            const backbone = getCrosswordBackbone(); // 이번 퍼즐에서 쓸 백본(언어별 고정값)
            const backboneSlot = backbone ? 1 : 0; // 백본이 currentWordList에서 자리 하나를 차지함
            const candidateCount = getCandidateCount(); // 성공률 낮은 언어는 후보를 더 많이 뽑음
            for (let attempt = 0; attempt < MAX_ATTEMPTS; attempt++) {
                const picks = pickRandomWords(pool, candidateCount);
                const engine = runEngine(picks, backbone);
                if (!bestEngine || engine.currentWordList.length > bestEngine.currentWordList.length) {
                    bestEngine = engine;
                    bestPicks = picks;
                }
                if (bestEngine.currentWordList.length === candidateCount + backboneSlot) break;
            }
            return buildResultFromEngine(bestEngine, bestPicks, backbone);
        }

        // 엔진 결과(1-indexed, 소문자)를 렌더링에서 쓰는 형식(0-indexed, 대문자)으로 변환
        function buildResultFromEngine(engine, picks, backbone) {
            const metaMap = new Map(picks.map(p => [p.word.toUpperCase(), p]));
            const size = GRID_SIZE;
            const grid = Array.from({ length: size }, () => Array(size).fill(null));
            const placed = [];
            const placedWordsUpper = new Set();
            const backboneUpper = (backbone || '').toUpperCase();

            for (const w of engine.currentWordList) {
                const upper = w.word.toUpperCase();
                const isBackbone = backboneUpper && upper === backboneUpper;

                const meta = metaMap.get(upper) || {};
                const row0 = w.row - 1;
                const col0 = w.col - 1;
                const vertical = !!w.vertical;

                for (let i = 0; i < upper.length; i++) {
                    const r = vertical ? row0 + i : row0;
                    const c = vertical ? col0 : col0 + i;
                    // 실제 단어 글자가 이미 그려져 있으면 그걸 우선(백본과 겹치는 교차점은
                    // 실제 정답 글자로 보이는 게 맞음). 백본만 있는 칸은 백본 스타일로 표시.
                    if (!grid[r][c] || !grid[r][c].isReal) {
                        grid[r][c] = { letter: upper[i], isBackbone };
                    }
                    if (!isBackbone) grid[r][c].isReal = true;
                }

                if (isBackbone) continue; // 백본 자체는 정답 목록/번호 부여에서 제외 (그리드 표시는 위에서 이미 함)

                placed.push({
                    word: upper,
                    clue: w.clue,
                    image: meta.image,
                    level: meta.level,
                    row: row0,
                    col: col0,
                    vertical,
                    number: w.number
                });
                placedWordsUpper.add(upper);
            }

            // 백본이 번호를 하나 차지했을 수 있어서(3번이 백본이면 2->4로 결번), 실제 단어만
            // 기준으로 번호를 다시 1부터 순서대로 매김 (같은 칸에서 시작하는 단어는 같은 번호 유지)
            placed.sort((a, b) => (a.row + a.col) - (b.row + b.col));
            let numCounter = 0;
            let lastPos = null;
            for (const p of placed) {
                const pos = `${p.row},${p.col}`;
                if (pos !== lastPos) { numCounter++; lastPos = pos; }
                p.number = numCounter;
            }

            const unplaced = picks.filter(p => !placedWordsUpper.has(p.word));
            return { grid, placed, unplaced };
        }

        // =========================================================
        // 4) 렌더링
        // =========================================================
        function renderPuzzle() {
            const pool = buildWordPool();
            const { grid, placed, unplaced } = generateCrossword(pool);

            // 엔진이 이미 각 단어에 번호를 부여했으므로(orderNumberWords) 그대로 사용
            const numberMap = {};
            placed.forEach(w => { numberMap[`${w.row},${w.col}`] = w.number; });

            // 배지
            puzzleCount++;
            levelBadge.textContent = (placed[0] && placed[0].level) || '-';
            batchBadge.textContent = `제 ${puzzleCount}회`;
            printTitle.textContent = `WordCross Puzzle - 제 ${puzzleCount}회`;

            // 그리드 렌더
            gridEl.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 1fr)`;
            gridEl.style.gridTemplateRows = `repeat(${GRID_SIZE}, 1fr)`;
            gridEl.innerHTML = '';
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const cell = grid[r][c];
                    const cellDiv = document.createElement('div');
                    if (cell) {
                        cellDiv.className = 'grid-cell';
                        if (cell.isBackbone) cellDiv.classList.add('grid-cell--backbone');
                        const num = numberMap[`${r},${c}`];
                        if (num) {
                            cellDiv.classList.add('grid-cell--numbered');
                            const numDiv = document.createElement('div');
                            numDiv.className = 'clue-number';
                            numDiv.textContent = num;
                            cellDiv.appendChild(numDiv);
                        }
                        const letterDiv = document.createElement('div');
                        letterDiv.className = 'puzzle-letter';
                        letterDiv.textContent = cell.letter;
                        cellDiv.appendChild(letterDiv);
                    } else {
                        cellDiv.className = 'grid-cell black-square';
                    }
                    gridEl.appendChild(cellDiv);
                }
            }

            // 단서 렌더 (썸네일 이미지 힌트 포함)
            const across = placed.filter(w => !w.vertical).sort((a, b) => numberMap[`${a.row},${a.col}`] - numberMap[`${b.row},${b.col}`]);
            const down = placed.filter(w => w.vertical).sort((a, b) => numberMap[`${a.row},${a.col}`] - numberMap[`${b.row},${b.col}`]);

            function renderClueList(listEl, words) {
                listEl.innerHTML = '';
                words.forEach(w => {
                    const num = numberMap[`${w.row},${w.col}`];
                    const li = document.createElement('li');
                    const thumb = w.image ? `<img class="clue-thumb" src="${w.image}" alt="${w.word}" data-word="${w.word}">` : '';
                    const full = cardsData.find(c => (c.word || '').toUpperCase() === w.word);
                    const pronunHtml = (full && full.showPronun && full.pronunciation)
                        ? `<span class="answer-pronun">[${full.pronunciation}]</span>`
                        : '';
                    li.innerHTML = `
                        <span class="clue-item-number">${num}.</span>
                        ${thumb}
                        <span class="clue-text">${w.clue}</span>
                        <span class="answer-text">${w.word}</span>
                        ${pronunHtml}
                    `;
                    listEl.appendChild(li);
                });
            }
            renderClueList(acrossListEl, across);
            renderClueList(downListEl, down);

            renderAnswerGrid(placed, numberMap);
            bindClueInteractions(across, down);

            if (unplaced.length) {
                console.info(`배치 실패한 단어 ${unplaced.length}개:`, unplaced.map(w => w.word).join(', '));
            }
        }

        // 정답 보기 시 하단에 표시되는 단어/의미/예문 요약 테이블
        function renderAnswerGrid(placed, numberMap) {
            const sorted = [...placed].sort((a, b) => numberMap[`${a.row},${a.col}`] - numberMap[`${b.row},${b.col}`]);
            const rows = sorted.map(w => {
                const full = cardsData.find(c => (c.word || '').toUpperCase() === w.word);
                const eng = full ? full.engExample : '';
                const kor = full ? full.korExample : '';
                const showPronun = full && full.showPronun;
                const wordPronun = showPronun && full.pronunciation ? `<div class="cell-pronun">[${full.pronunciation}]</div>` : '';
                const sentPronun = showPronun && full.sentencePronunciation ? `<div class="cell-pronun">${full.sentencePronunciation}</div>` : '';
                const thumbImg = w.image ? `<img src="${w.image}" alt="${w.word}">` : '';
                return `
                    <tr>
                        <td class="cell-thumb">${thumbImg}</td>
                        <td class="cell-word">${w.word}${wordPronun}</td>
                        <td>${w.clue}</td>
                        <td>${eng}${sentPronun}</td>
                        <td>${kor}</td>
                    </tr>
                `;
            }).join('');

            answerGridEl.innerHTML = `
                <div class="answer-grid-header">
                    <h3>${t('answerSummary')}</h3>
                    <span class="clue-header-controls">
                        <button type="button" class="speak-btn" id="answerSpeakBtn" title="전체듣기 (설정에 따름)"><i class="fa-solid fa-volume-high"></i></button>
                    </span>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th class="cell-thumb"></th>
                            <th>${t('colWord')}</th>
                            <th>${t('colMeaning')}</th>
                            <th>${t('colSentence')}</th>
                            <th>${t('colMeaningSentence')}</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;

            const answerSpeakBtn = document.getElementById('answerSpeakBtn');
            answerSpeakBtn.onclick = () => playAllWords(sorted, getAudioPrefSuffixes(), answerSpeakBtn);
        }

        // 썸네일 클릭(확대 + 영어 발음 동시 재생) + 헤더 전체듣기 버튼 연결
        function bindClueInteractions(acrossWords, downWords) {
            document.querySelectorAll('.clue-thumb').forEach(img => {
                img.addEventListener('click', () => {
                    lightboxImg.src = img.src;
                    lightboxImg.alt = img.alt;
                    lightbox.classList.add('is-open');
                    playSequence(img.dataset.word, ['ee']); // 확대와 동시에 영어 발음 재생
                });
            });

            const acrossSpeakBtn = document.getElementById('acrossSpeakBtn');
            const downSpeakBtn = document.getElementById('downSpeakBtn');

            acrossSpeakBtn.onclick = () => playAllWords(acrossWords, getAudioPrefSuffixes(), acrossSpeakBtn);
            downSpeakBtn.onclick = () => playAllWords(downWords, getAudioPrefSuffixes(), downSpeakBtn);
        }


        // =========================================================
        // 5) 이벤트
        // =========================================================
        document.addEventListener('DOMContentLoaded', () => {
            const newPuzzleBtn = document.getElementById('newPuzzleBtn');

            function renderPuzzleWithLoading() {
                newPuzzleBtn.disabled = true;
                newPuzzleBtn.textContent = t('generating');
                // setTimeout으로 한 프레임 양보해서 "생성 중..." 텍스트가 먼저 그려지게 함
                setTimeout(() => {
                    renderPuzzle();
                    newPuzzleBtn.disabled = false;
                    newPuzzleBtn.textContent = t('newPuzzle');
                }, 30);
            }

            renderPuzzleWithLoading();

            newPuzzleBtn.addEventListener('click', renderPuzzleWithLoading);

            toggleAnswerBtn.addEventListener('click', () => {
                document.body.classList.toggle('mode-answer');
                const isAnswer = document.body.classList.contains('mode-answer');
                toggleAnswerBtn.textContent = isAnswer ? t('showProblem') : t('showAnswer');
            });

            document.getElementById('printBtn').addEventListener('click', () => {
                const num = String(puzzleCount).padStart(3, '0');
                const isAnswer = document.body.classList.contains('mode-answer');
                const suffix = isAnswer ? '정답' : '문제';
                const originalTitle = document.title;
                document.title = `${num}_${puzzleCount}회_${suffix}`; // PDF 저장 시 제안 파일명
                window.print();
                document.title = originalTitle; // 인쇄 다이얼로그 닫힌 후 원래 제목 복원
            });

            lightbox.addEventListener('click', () => {
                lightbox.classList.remove('is-open');
            });
        });
    </script>
    <script src="nav.js"></script>
</body>
</html>
